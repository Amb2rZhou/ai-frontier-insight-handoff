# AI Frontier Insight Bot - Data Sources Configuration

# ═══════════════════════════════════════════════════
# Twitter / X (via x-monitor)
# ═══════════════════════════════════════════════════
# 实际数据来自 x-monitor 子系统，通过浏览器抓取 X List (~200 账号)
# 数据存储在 data/x-monitor/{date}.json，由 TwitterCollector 读取
# 账号来源：mitbunny.ai 数据库，筛选条件：粉丝≥5000，AI 相关角色
# 覆盖：OpenAI, Google/DeepMind, NVIDIA, Anthropic, Meta, Microsoft,
#       HuggingFace, 各大高校教授, AI 创业公司创始人, 独立研究者等
twitter:
  enabled: true
  source: "x-monitor"  # 从 data/x-monitor/*.json 读取，非 API 直采
  list_url: "https://x.com/i/lists/2026486577304842549"
  max_members: 200
  sync_source: "https://x.mitbunny.ai"

# ═══════════════════════════════════════════════════
# GitHub
# ═══════════════════════════════════════════════════
github:
  enabled: true
  trending:
    topics:
      - "artificial-intelligence"
      - "machine-learning"
      - "llm"
      - "agents"
      - "deep-learning"
      - "generative-ai"
    language: ""
    since: "daily"
    max_results: 30
  watch_repos:
    # Foundation model SDKs
    - "openai/openai-python"
    - "anthropics/anthropic-sdk-python"
    # Frameworks
    - "langchain-ai/langchain"
    - "langchain-ai/langgraph"
    - "microsoft/autogen"
    - "crewAIInc/crewAI"
    # Models & Serving
    - "huggingface/transformers"
    - "vllm-project/vllm"
    - "ollama/ollama"
    # Notable Projects
    - "All-Hands-AI/OpenHands"
    - "browser-use/browser-use"
    - "Significant-Gravitas/AutoGPT"
    # Benchmarks
    - "princeton-nlp/SWE-bench"

# ═══════════════════════════════════════════════════
# Arxiv
# ═══════════════════════════════════════════════════
arxiv:
  enabled: true
  categories:
    - "cs.AI"   # Artificial Intelligence
    - "cs.CL"   # Computation and Language (NLP)
    - "cs.LG"   # Machine Learning
    - "cs.CV"   # Computer Vision
    - "cs.MA"   # Multi-Agent Systems
  max_results: 25
  sort_by: "submittedDate"

# ═══════════════════════════════════════════════════
# HuggingFace
# ═══════════════════════════════════════════════════
huggingface:
  enabled: true
  trending_models: 15
  new_models: 10
  trending_spaces: 10

